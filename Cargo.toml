[package]
name = "oxideav-opus"
version = "0.0.3"
edition = "2021"
rust-version = "1.80"
license = "MIT"
repository = "https://github.com/OxideAV/oxideav-opus"
authors = ["Mark Karpeles"]
description = "Opus audio codec for oxideav — SILK + CELT decode (mono/stereo) + CELT-only encode"

readme = "README.md"
homepage = "https://github.com/OxideAV/oxideav-opus"
keywords = ["multimedia", "audio", "opus", "codec", "pure-rust"]
categories = ["multimedia::encoding", "multimedia::audio"]

[dependencies]
oxideav-core = "0.1"
oxideav-codec = "0.1"
oxideav-celt = "0.0"

[dev-dependencies]
oxideav-ogg = "0.0"
oxideav-container = "0.1"